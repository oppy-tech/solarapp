name: Multi-Agent Orchestrator

on:
  workflow_dispatch:
    inputs:
      skip_agents:
        description: 'Skip agent execution (use existing agent branches)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

env:
  DELIVERY_BRANCH: feature/multi-agent-delivery
  PHP_VERSION: '8.4'
  ANTHROPIC_MODEL: claude-sonnet-4-20250514

jobs:
  # ============================================================
  # Phase 1: Parallel Agent Execution
  # ============================================================

  agent-backend:
    name: "Agent: Backend (Task A)"
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_agents }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, sqlite3, pdo_sqlite, pdo_mysql
          tools: composer:v2

      - name: Setup Laravel environment
        working-directory: solar-interview
        run: |
          cp .env.example .env
          composer install --quiet
          composer require laravel/sanctum --quiet
          php artisan key:generate
          sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
          sed -i 's/^DB_HOST/#DB_HOST/' .env
          sed -i 's/^DB_PORT/#DB_PORT/' .env
          sed -i 's/^DB_DATABASE/#DB_DATABASE/' .env
          sed -i 's/^DB_USERNAME/#DB_USERNAME/' .env
          sed -i 's/^DB_PASSWORD/#DB_PASSWORD/' .env
          touch database/database.sqlite
          php artisan migrate:fresh --quiet
          php artisan db:seed --class=InterviewSeeder --quiet

      - name: Configure git identity
        run: |
          git config user.name "Agent Bot"
          git config user.email "agent@solarapp.dev"

      - name: Create agent branch
        run: |
          git checkout -b agent/backend
          git push origin agent/backend --force

      - name: Run Backend Agent
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          mode: agent
          direct_prompt: |
            Read the file agents/backend-agent.md for your full instructions.

            You are the Backend Agent. Follow TDD strictly:
            1. Read the agent prompt (including Known Issues section), the existing controller, models, and migration
            2. Write ALL tests (happy path AND negative/edge case) in solar-interview/tests/Feature/DashboardControllerTest.php
            3. Run tests — they should fail (red)
            4. Implement the changes in solar-interview/app/Http/Controllers/Ahj/DashboardController.php
            5. Run tests again — fix your implementation until ALL tests pass (green)
            6. If any test still fails, DO NOT STOP. Debug the failure, update the implementation, and re-run tests.
            7. Repeat step 5-6 until you see 0 failures.

            CRITICAL: You must not finish until ALL tests pass. Run the test suite as your final step and confirm 0 failures in the output. If any test fails, fix the code and re-run.

            Run tests with: cd solar-interview && php artisan test --filter=DashboardControllerTest

            IMPORTANT: Only edit DashboardController.php and your test file. Do not touch views, models, or routes.
          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep"
          model: ${{ env.ANTHROPIC_MODEL }}
          timeout_minutes: 45
          max_turns: 50

      - name: Verify all tests pass
        working-directory: solar-interview
        run: php artisan test --filter=DashboardControllerTest

      - name: Push agent branch
        run: |
          git add -A
          git diff --cached --quiet || git commit -m "feat(backend): Task A - date filtering, avg approval time, pagination"
          git push origin agent/backend --force

  agent-frontend:
    name: "Agent: Frontend (Task B)"
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_agents }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, sqlite3, pdo_sqlite, pdo_mysql
          tools: composer:v2

      - name: Setup Laravel environment
        working-directory: solar-interview
        run: |
          cp .env.example .env
          composer install --quiet
          composer require laravel/sanctum --quiet
          php artisan key:generate
          sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
          sed -i 's/^DB_HOST/#DB_HOST/' .env
          sed -i 's/^DB_PORT/#DB_PORT/' .env
          sed -i 's/^DB_DATABASE/#DB_DATABASE/' .env
          sed -i 's/^DB_USERNAME/#DB_USERNAME/' .env
          sed -i 's/^DB_PASSWORD/#DB_PASSWORD/' .env
          touch database/database.sqlite
          php artisan migrate:fresh --quiet
          php artisan db:seed --class=InterviewSeeder --quiet

      - name: Configure git identity
        run: |
          git config user.name "Agent Bot"
          git config user.email "agent@solarapp.dev"

      - name: Create agent branch
        run: |
          git checkout -b agent/frontend
          git push origin agent/frontend --force

      - name: Run Frontend Agent
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          mode: agent
          direct_prompt: |
            Read the file agents/frontend-agent.md for your full instructions.

            You are the Frontend Agent. Follow TDD strictly:
            1. Read the agent prompt (including Known Issues section), the existing blade template, layout, and controller
            2. Write ALL tests (happy path AND negative/edge case) in solar-interview/tests/Feature/DashboardViewTest.php
            3. Run tests — they should fail (red)
            4. Implement the changes in solar-interview/resources/views/pages/ahj/dashboard.blade.php
            5. Run tests again — fix your implementation until ALL tests pass (green)
            6. If any test still fails, DO NOT STOP. Debug the failure, update the implementation or test, and re-run.
            7. Repeat step 5-6 until you see 0 failures.

            CRITICAL: You must not finish until ALL tests pass. Run the test suite as your final step and confirm 0 failures in the output. If any test fails, fix the code and re-run.

            NOTE: The backend agent runs in parallel and implements the controller. Your tests will hit the CURRENT controller (pre-implementation). For tests that depend on backend behaviour (e.g. avg approval time format), test what YOUR view does with the data contract. If the controller currently returns 'N/A' as a string for avg_approval_time, but the contract says it returns int|null, write your test against the contract (int|null), not the current implementation. Seed data and check what the controller actually returns.

            Run tests with: cd solar-interview && php artisan test --filter=DashboardViewTest

            IMPORTANT: Only edit dashboard.blade.php and your test file. Do not touch controllers, models, or routes.
          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep"
          model: ${{ env.ANTHROPIC_MODEL }}
          timeout_minutes: 45
          max_turns: 50

      - name: Verify all tests pass
        working-directory: solar-interview
        run: php artisan test --filter=DashboardViewTest

      - name: Push agent branch
        run: |
          git add -A
          git diff --cached --quiet || git commit -m "feat(frontend): Task B - date picker, approval time display, pagination nav"
          git push origin agent/frontend --force

  agent-data-integrity:
    name: "Agent: Data Integrity (Task C)"
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_agents }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, sqlite3, pdo_sqlite, pdo_mysql
          tools: composer:v2

      - name: Setup Laravel environment
        working-directory: solar-interview
        run: |
          cp .env.example .env
          composer install --quiet
          composer require laravel/sanctum --quiet
          php artisan key:generate
          sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
          sed -i 's/^DB_HOST/#DB_HOST/' .env
          sed -i 's/^DB_PORT/#DB_PORT/' .env
          sed -i 's/^DB_DATABASE/#DB_DATABASE/' .env
          sed -i 's/^DB_USERNAME/#DB_USERNAME/' .env
          sed -i 's/^DB_PASSWORD/#DB_PASSWORD/' .env
          touch database/database.sqlite
          php artisan migrate:fresh --quiet
          php artisan db:seed --class=InterviewSeeder --quiet

      - name: Configure git identity
        run: |
          git config user.name "Agent Bot"
          git config user.email "agent@solarapp.dev"

      - name: Create agent branch
        run: |
          git checkout -b agent/data-integrity
          git push origin agent/data-integrity --force

      - name: Run Data Integrity Agent
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          mode: agent
          direct_prompt: |
            Read the file agents/data-integrity-agent.md for your full instructions.

            You are the Data Integrity Agent. Follow TDD strictly:
            1. Read the agent prompt (including Known Issues section), the models, migration, seeder, and sample_data.json
            2. Write ALL tests (including negative/edge cases) in solar-interview/tests/Feature/DataIntegrityCheckTest.php
            3. Create the Artisan command in solar-interview/app/Console/Commands/DataIntegrityCheck.php
            4. Run tests — they should fail (red)
            5. Implement the command logic
            6. Run tests again — fix your implementation until ALL tests pass (green)
            7. If any test still fails, DO NOT STOP. Debug the failure, update the implementation, and re-run.
            8. Repeat step 6-7 until you see 0 failures.
            9. Run the command against the seeded database to generate DATA_INTEGRITY_REPORT.md

            CRITICAL: You must not finish until ALL tests pass. Run the test suite as your final step and confirm 0 failures in the output. If any test fails, fix the code and re-run.

            Note on null fields: SQLite and MySQL handle NOT NULL constraints differently. If a test tries to insert a NULL into a NOT NULL column, it may fail at the DB level. In that case, either use DB::table()->insert() to bypass Eloquent, or adjust the test to use an empty string instead of null. The important thing is that the command DETECTS the issue.

            Run tests with: cd solar-interview && php artisan test --filter=DataIntegrityCheckTest
            Run the command with: cd solar-interview && php artisan data:integrity-check

            IMPORTANT: Do not modify existing models, controllers, views, or migrations. You may only create your command file, test file, and the report.
          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep"
          model: ${{ env.ANTHROPIC_MODEL }}
          timeout_minutes: 45
          max_turns: 50

      - name: Verify all tests pass
        working-directory: solar-interview
        run: php artisan test --filter=DataIntegrityCheckTest

      - name: Push agent branch
        run: |
          git add -A
          git diff --cached --quiet || git commit -m "feat(data): Task C - data integrity audit command and report"
          git push origin agent/data-integrity --force

  # ============================================================
  # Phase 2: Merge Agent Branches
  # ============================================================

  merge-agents:
    name: "Merge Agent Branches"
    runs-on: ubuntu-latest
    needs: [agent-backend, agent-frontend, agent-data-integrity]
    if: always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "Multi-Agent Orchestrator"
          git config user.email "orchestrator@solarapp.dev"

      - name: Fetch all agent branches
        run: |
          git fetch origin agent/backend agent/frontend agent/data-integrity

      - name: Create delivery branch and merge agents
        run: |
          git checkout -b ${{ env.DELIVERY_BRANCH }}

          echo "Merging backend agent..."
          git merge origin/agent/backend --no-edit -m "merge: backend agent (Task A)"

          echo "Merging frontend agent..."
          git merge origin/agent/frontend --no-edit -m "merge: frontend agent (Task B)" || {
            # Resolve output.txt conflicts (claude-code-action log file) by keeping both
            git checkout --theirs output.txt 2>/dev/null || true
            git add output.txt 2>/dev/null || true
            git -c core.editor=true merge --continue
          }

          echo "Merging data-integrity agent..."
          git merge origin/agent/data-integrity --no-edit -m "merge: data-integrity agent (Task C)" || {
            git checkout --theirs output.txt 2>/dev/null || true
            git add output.txt 2>/dev/null || true
            git -c core.editor=true merge --continue
          }

          # Clean up action output files
          git rm -f output.txt 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: remove claude-code-action output files"

          git push origin ${{ env.DELIVERY_BRANCH }} --force

  # ============================================================
  # Phase 3: Test Suite
  # ============================================================

  test:
    name: "Test Suite"
    runs-on: ubuntu-latest
    needs: merge-agents
    if: always() && needs.merge-agents.result == 'success'
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DELIVERY_BRANCH }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, sqlite3, pdo_sqlite, pdo_mysql
          tools: composer:v2
          coverage: none

      - name: Setup Laravel environment
        working-directory: solar-interview
        run: |
          cp .env.example .env
          composer install --quiet
          composer require laravel/sanctum --quiet
          php artisan key:generate

      - name: Configure test environment
        working-directory: solar-interview
        run: |
          sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=mysql/' .env
          sed -i 's/^.*DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/^.*DB_PORT=.*/DB_PORT=3306/' .env
          sed -i 's/^.*DB_DATABASE=.*/DB_DATABASE=testing/' .env
          sed -i 's/^.*DB_USERNAME=.*/DB_USERNAME=root/' .env
          sed -i 's/^.*DB_PASSWORD=.*/DB_PASSWORD=password/' .env

      - name: Run full test suite
        working-directory: solar-interview
        run: |
          mkdir -p tests/Unit
          php artisan test

  # ============================================================
  # Phase 4: Create Pull Request
  # ============================================================

  create-pr:
    name: "Create Pull Request"
    runs-on: ubuntu-latest
    needs: test
    if: always() && needs.test.result == 'success'
    outputs:
      pr_number: ${{ steps.create-pr.outputs.pr_number }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DELIVERY_BRANCH }}
          fetch-depth: 0

      - name: Create or find Pull Request
        id: create-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if a PR already exists for this branch
          EXISTING_PR=$(gh pr list --head ${{ env.DELIVERY_BRANCH }} --base main --json number --jq '.[0].number // empty')

          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists, reusing"
            echo "pr_number=$EXISTING_PR" >> "$GITHUB_OUTPUT"
          else
            PR_URL=$(gh pr create \
              --base main \
              --head ${{ env.DELIVERY_BRANCH }} \
              --title "feat: Multi-Agent Dashboard Enhancement (Tasks A, B, C)" \
              --body "$(cat <<'BODY'
          ## Summary
          Multi-agent workflow delivery for SolarAPP+ Dashboard enhancements.

          ### Task A: Dashboard Analytics (Backend)
          - Date range filtering via start_date/end_date query params
          - Average approval time calculation (DB aggregate)
          - Server-side pagination (20 per page)

          ### Task B: Dashboard UI (Frontend)
          - Date range picker with filter/clear controls
          - Human-readable average approval time display
          - Pagination navigation with filter persistence in URL
          - Pending projects stat card

          ### Task C: Data Integrity Report
          - Artisan command data:integrity-check scans for anomalies
          - DATA_INTEGRITY_REPORT.md with findings by severity
          - Covers both AHJs independently

          ## Test Results
          All tests passed in CI (see Test Suite job).

          ## Acceptance Criteria
          See agents/product-owner-agent.md for full AC list (AC1-AC7).

          ---
          Generated by Multi-Agent Orchestrator workflow
          BODY
          )")
            PR_NUM=$(echo "$PR_URL" | grep -o '[0-9]*$')
            echo "Created PR #$PR_NUM"
            echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"
          fi

  # ============================================================
  # Phase 5: Code Review
  # ============================================================

  code-review:
    name: "Code Review Agent"
    runs-on: ubuntu-latest
    needs: create-pr
    if: always() && needs.create-pr.result == 'success' && needs.create-pr.outputs.pr_number != ''
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DELIVERY_BRANCH }}
          fetch-depth: 0

      - name: Run Code Review Agent
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          mode: agent
          model: ${{ env.ANTHROPIC_MODEL }}
          direct_prompt: |
            You are a senior code reviewer for the SolarAPP+ project.

            Read agents/product-owner-agent.md for the full acceptance criteria (AC1 through AC7).

            Review the changes by:
            1. Run: git diff main..HEAD to see all changes
            2. Read each changed file and check for:
               - Security issues (XSS, SQL injection, input validation)
               - Performance issues (N+1 queries, unbounded queries, memory usage)
               - Multi-tenancy violations (data leaking between AHJs)
               - Laravel best practices (Eloquent usage, Blade escaping, pagination)
               - Test coverage (do tests cover the acceptance criteria, including negative tests?)
            3. Validate against ALL acceptance criteria in agents/product-owner-agent.md (AC1 through AC7)
            4. Check that agents respected their file ownership boundaries

            Post your review as a PR comment using:
            gh pr comment ${{ needs.create-pr.outputs.pr_number }} --body "YOUR REVIEW"

            Use this format:

            ## Code Review: Multi-Agent Delivery

            ### Security
            [findings]

            ### Performance
            [findings]

            ### Multi-Tenancy
            [findings]

            ### Acceptance Criteria Coverage
            | AC | Status | Notes |
            |----|--------|-------|
            | AC1.1 | PASS/FAIL | ... |
            (cover ALL ACs from AC1 through AC7)

            ### Recommendations
            [any changes needed before merge]

            Be specific — reference file paths and line numbers.
          allowed_tools: "Bash,Read,Glob,Grep"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
